name: Release

on:
  release:
    types: [published]

env:
  JAVA_DISTRIBUTION: temurin
  JAVA_VERSION_FILE: .java-version

jobs:
  publish:
    name: Publish to Gradle Plugin Portal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version-file: ${{ env.JAVA_VERSION_FILE }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Resolve version
        id: version
        run: echo "semantic=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Build jar
        run: ./gradlew build -Pversion=${{ steps.version.outputs.semantic }} -x check

      - name: Publish to Gradle Plugin Portal
        run: ./gradlew publishPlugins -Pversion=${{ steps.version.outputs.semantic }} -x check
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
