name: Build

on:
  pull_request:
    branches: [ main ]

env:
  JAVA_DISTRIBUTION: temurin
  JAVA_VERSION_FILE: .java-version

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version-file: ${{ env.JAVA_VERSION_FILE }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Check formatting (ktfmt)
        run: ./gradlew ktfmtCheck

      - name: Static analysis (Detekt)
        run: ./gradlew detekt

      - name: Publish Detekt SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/detekt/detekt.sarif

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version-file: ${{ env.JAVA_VERSION_FILE }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run unit tests
        run: ./gradlew test

      - name: Code coverage (Kover)
        run: ./gradlew koverVerify koverXmlReport

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: build/test-results/test/**/*.xml

      - name: Publish Kover coverage report
        if: always()
        uses: mi-kas/kover-report@v1
        with:
          path: build/reports/kover/report.xml
          title: Code Coverage
          update-comment: true
          min-coverage-overall: 85
          min-coverage-changed-files: 80

  build:
    name: Build
    needs: [ lint, test ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version-file: ${{ env.JAVA_VERSION_FILE }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Full build
        run: ./gradlew build -x test -x ktfmtCheck -x detekt -x koverVerify
